services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rewardtodo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rewardtodo}
      POSTGRES_DB: ${POSTGRES_DB:-rewardtodo}

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      AUTH_INITIAL_USERNAME: ${AUTH_INITIAL_USERNAME:-${APP_BASIC_AUTH_USER:-reward}}
      AUTH_INITIAL_PASSWORD: ${AUTH_INITIAL_PASSWORD:-${APP_BASIC_AUTH_PASSWORD:-replace-me}}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    command:
      - /bin/sh
      - -c
      - |
        set -e
        until python - <<'PY'
        import psycopg2
        psycopg2.connect(
            host="db",
            port=5432,
            user="${POSTGRES_USER:-rewardtodo}",
            password="${POSTGRES_PASSWORD:-rewardtodo}",
            dbname="${POSTGRES_DB:-rewardtodo}",
        ).close()
        PY
        do
          sleep 1
        done
        export PYTHONPATH=/app
        python scripts/bootstrap_alembic.py
        alembic upgrade head
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db
    networks:
      default:
        aliases:
          - backend
    working_dir: /app
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/scripts:/app/scripts

  frontend:
    build: ./frontend
    depends_on:
      - backend
    working_dir: /app
    environment:
      VITE_BACKEND_ORIGIN: http://backend:8000
    networks:
      default:
        aliases:
          - frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.js:/app/vite.config.js
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    environment:
      ENABLE_BASIC_AUTH: ${ENABLE_BASIC_AUTH:-false}
    command:
      - /bin/sh
      - -c
      - |
        until wget -q -O- http://backend:8000/api/public/health >/dev/null 2>&1; do
          sleep 1
        done
        until wget -q -O- http://frontend:5173/ >/dev/null 2>&1; do
          sleep 1
        done
        if [ "$${ENABLE_BASIC_AUTH:-false}" = "true" ]; then
          BASIC_AUTH_BLOCK='auth_basic "Reward Todo";
            auth_basic_user_file /etc/nginx/.htpasswd;'
        else
          BASIC_AUTH_BLOCK=''
        fi
        export BASIC_AUTH_BLOCK
        envsubst '$${BASIC_AUTH_BLOCK}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./proxy/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - frontend
      - backend
