services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rewardtodo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rewardtodo}
      POSTGRES_DB: ${POSTGRES_DB:-rewardtodo}

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - db
    networks:
      default:
        aliases:
          - backend
    working_dir: /app
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts

  frontend:
    build: ./frontend
    depends_on:
      - backend
    working_dir: /app
    environment:
      VITE_BACKEND_ORIGIN: http://backend:8000
    networks:
      default:
        aliases:
          - frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.js:/app/vite.config.js
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    environment:
      ENABLE_BASIC_AUTH: ${ENABLE_BASIC_AUTH:-false}
    command:
      - /bin/sh
      - -c
      - |
        if [ "$${ENABLE_BASIC_AUTH:-false}" = "true" ]; then
          BASIC_AUTH_BLOCK='auth_basic "Reward Todo";
            auth_basic_user_file /etc/nginx/.htpasswd;'
        else
          BASIC_AUTH_BLOCK=''
        fi
        export BASIC_AUTH_BLOCK
        envsubst '$${BASIC_AUTH_BLOCK}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./proxy/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - frontend
      - backend
