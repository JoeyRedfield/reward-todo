services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rewardtodo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rewardtodo}
      POSTGRES_DB: ${POSTGRES_DB:-rewardtodo}

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - db
    networks:
      default:
        aliases:
          - backend
    working_dir: /app
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts

  frontend:
    build: ./frontend
    depends_on:
      - backend
    working_dir: /app
    environment:
      VITE_BACKEND_ORIGIN: http://backend:8000
    networks:
      default:
        aliases:
          - frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.js:/app/vite.config.js
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./proxy/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - frontend
      - backend
